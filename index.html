<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mana Counter</title>
<style>
  :root {
    --bg: #14141a;
    --card-radius: 16px;
    --gap: 12px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #eee;
    overscroll-behavior: none;
    user-select: none;
  }

  .app {
    max-width: 720px;
    margin: 0 auto;
    padding: env(safe-area-inset-top, 0) 12px calc(env(safe-area-inset-bottom, 0) + 12px);
    min-height: 100%;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 4px 10px;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 600;
    margin: 0;
    letter-spacing: 0.02em;
    color: #ccc;
  }

  .total-pill {
    font-size: 0.95rem;
    font-weight: 700;
    background: #23232c;
    border: 1px solid #34343f;
    border-radius: 999px;
    padding: 6px 14px;
    color: #fff;
  }

  .reset-btn {
    background: #23232c;
    border: 1px solid #34343f;
    color: #bbb;
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }
  .reset-btn:active { background: #2e2e38; }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--gap);
    flex: 1;
  }

  @media (min-width: 520px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }

  .card {
    border-radius: var(--card-radius);
    padding: 14px 10px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    position: relative;
    min-height: 190px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .card .symbol {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 1.1rem;
    margin-bottom: 4px;
  }

  .card .name {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    opacity: 0.75;
    margin-bottom: 2px;
  }

  .card .count {
    font-size: 2.6rem;
    font-weight: 800;
    line-height: 1;
    margin: 4px 0 10px;
    font-variant-numeric: tabular-nums;
  }

  .card .buttons {
    display: flex;
    width: 100%;
    gap: 8px;
  }

  .stepper {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    height: 46px;
    font-size: 1.4rem;
    font-weight: 700;
    border: none;
    cursor: pointer;
    background: rgba(0,0,0,0.18);
    color: inherit;
    touch-action: manipulation;
    transition: transform 0.05s ease;
  }
  .stepper:active { transform: scale(0.94); }

  .stepper.minus { background: rgba(0,0,0,0.28); }
  .stepper.plus { background: rgba(255,255,255,0.22); }

  /* Color themes */
  .card.white   { background: #f4ecd8; color: #3a3320; }
  .card.blue    { background: #0f5fa8; color: #eaf3ff; }
  .card.black   { background: #1b1b20; color: #e8e6e0; border-color: rgba(255,255,255,0.12); }
  .card.red     { background: #b1362f; color: #fff0ec; }
  .card.green   { background: #1e6b3a; color: #ecfff1; }
  .card.colorless { background: #7a7f87; color: #fff; }

  .card.white .symbol   { background: #fffbe9; color: #a68c1f; }
  .card.blue .symbol     { background: #d7ecff; color: #0f5fa8; }
  .card.black .symbol    { background: #3a3a42; color: #e8e6e0; }
  .card.red .symbol      { background: #ffd9d2; color: #b1362f; }
  .card.green .symbol    { background: #d3ffdf; color: #1e6b3a; }
  .card.colorless .symbol{ background: #e4e6ea; color: #5b5f66; }

  footer {
    text-align: center;
    font-size: 0.7rem;
    color: #555;
    padding: 14px 0 4px;
  }

  .flash {
    animation: flash 0.18s ease;
  }
  @keyframes flash {
    0% { filter: brightness(1.35); }
    100% { filter: brightness(1); }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Mana Counter</h1>
    <div class="header-actions">
      <div class="total-pill" id="total">Total: 0</div>
      <button class="reset-btn" id="resetBtn">Reset</button>
    </div>
  </header>

  <div class="grid" id="grid"></div>

  <footer>Tap +/- for 1 &middot; hold for rapid count</footer>
</div>

<script>
(function () {
  const COLORS = [
    { key: "white",     name: "White",     symbol: "W" },
    { key: "blue",      name: "Blue",      symbol: "U" },
    { key: "black",     name: "Black",     symbol: "B" },
    { key: "red",       name: "Red",       symbol: "R" },
    { key: "green",     name: "Green",     symbol: "G" },
    { key: "colorless", name: "Colorless", symbol: "C" },
  ];

  const STORAGE_KEY = "manaCounterState";
  const HOLD_DELAY = 400;     // ms before rapid-fire starts
  const HOLD_INTERVAL = 90;   // ms between rapid-fire ticks

  let state = loadState();

  const grid = document.getElementById("grid");
  const totalEl = document.getElementById("total");

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        const s = {};
        COLORS.forEach(c => { s[c.key] = Number.isFinite(parsed[c.key]) ? parsed[c.key] : 0; });
        return s;
      }
    } catch (e) {}
    const s = {};
    COLORS.forEach(c => { s[c.key] = 0; });
    return s;
  }

  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  }

  function updateTotal() {
    const total = COLORS.reduce((sum, c) => sum + state[c.key], 0);
    totalEl.textContent = "Total: " + total;
  }

  function setCount(key, value, countEl) {
    state[key] = Math.max(0, value);
    countEl.textContent = state[key];
    updateTotal();
    saveState();
  }

  function flashCard(cardEl) {
    cardEl.classList.remove("flash");
    void cardEl.offsetWidth;
    cardEl.classList.add("flash");
  }

  COLORS.forEach(c => {
    const card = document.createElement("div");
    card.className = "card " + c.key;

    card.innerHTML = `
      <div class="symbol">${c.symbol}</div>
      <div class="name">${c.name}</div>
      <div class="count">${state[c.key]}</div>
      <div class="buttons">
        <button class="stepper minus" aria-label="Decrease ${c.name}">&minus;</button>
        <button class="stepper plus" aria-label="Increase ${c.name}">+</button>
      </div>
    `;

    grid.appendChild(card);

    const countEl = card.querySelector(".count");
    const minusBtn = card.querySelector(".minus");
    const plusBtn = card.querySelector(".plus");

    function attachHold(btn, delta) {
      let holdTimeout = null;
      let holdInterval = null;
      let firedByHold = false;

      const step = () => {
        setCount(c.key, state[c.key] + delta, countEl);
        flashCard(card);
      };

      const start = (e) => {
        e.preventDefault();
        firedByHold = false;
        step(); // immediate tap response
        holdTimeout = setTimeout(() => {
          firedByHold = true;
          holdInterval = setInterval(step, HOLD_INTERVAL);
        }, HOLD_DELAY);
      };

      const stop = () => {
        clearTimeout(holdTimeout);
        clearInterval(holdInterval);
        holdTimeout = null;
        holdInterval = null;
      };

      btn.addEventListener("pointerdown", start);
      btn.addEventListener("pointerup", stop);
      btn.addEventListener("pointerleave", stop);
      btn.addEventListener("pointercancel", stop);
    }

    attachHold(minusBtn, -1);
    attachHold(plusBtn, 1);
  });

  document.getElementById("resetBtn").addEventListener("click", () => {
    COLORS.forEach(c => {
      state[c.key] = 0;
    });
    document.querySelectorAll(".count").forEach(el => { el.textContent = "0"; });
    updateTotal();
    saveState();
  });

  updateTotal();
})();
</script>
</body>
</html>
